<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Список дел</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Syne:wght@600;700;800&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>

  <main class="app-shell">
    <header class="app-header reveal">
      <p class="eyebrow">Ежедневный ритм</p>
      <h1>Список дел</h1>
      <p class="subtitle">Двигайтесь вперед, закрывая задачи по одной.</p>
    </header>

    <section class="panel reveal">
      <form id="todo-form" class="todo-form" autocomplete="off">
        <label for="todo-input" class="sr-only">Название задачи</label>
        <input
          id="todo-input"
          name="task"
          type="text"
          maxlength="120"
          placeholder="Что нужно сделать дальше?"
          required
        >
        <button type="submit">Добавить</button>
      </form>

      <div class="toolbar">
        <div class="filters" role="tablist" aria-label="Фильтр задач">
          <button class="filter-btn is-active" data-filter="all" type="button" role="tab" aria-selected="true">Все</button>
          <button class="filter-btn" data-filter="active" type="button" role="tab" aria-selected="false">Активные</button>
          <button class="filter-btn" data-filter="completed" type="button" role="tab" aria-selected="false">Выполненные</button>
        </div>
        <button id="clear-completed" class="ghost-btn" type="button">Удалить выполненные</button>
      </div>

      <ul id="todo-list" class="todo-list" aria-live="polite"></ul>

      <footer class="list-footer">
        <p id="items-left">Осталось: 0</p>
      </footer>
    </section>
  </main>

  <template id="todo-item-template">
    <li class="todo-item">
      <label class="todo-check">
        <input class="todo-toggle" type="checkbox">
        <span class="checkmark" aria-hidden="true"></span>
      </label>
      <span class="todo-text"></span>
      <button class="delete-btn" type="button" aria-label="Удалить задачу">Удалить</button>
    </li>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
